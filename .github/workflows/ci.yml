name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore SampleApi.sln

    - name: Build solution
      run: dotnet build SampleApi.sln --configuration Release --no-restore

    - name: Run VSTest with coverage
      run: |
        dotnet msbuild SampleApi.Test/SampleApi.Test.csproj \
          /t:VSTest \
          /p:Configuration=Release \
          /p:VSTestCollect="XPlat Code Coverage" \
          /p:VSTestResultsDirectory="${{ github.workspace }}/coverage"

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate HTML coverage report
      run: |
        reportgenerator \
          -reports:"${{ github.workspace }}/coverage/**/coverage.cobertura.xml" \
          -targetdir:"${{ github.workspace }}/coverage-report" \
          -reporttypes:Html

    - name: Deploy coverage report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: coverage-report
        publish_branch: gh-pages

